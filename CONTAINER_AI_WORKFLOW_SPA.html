    m2_nav: "2. Agent 雙小組",
    m2_title: "Agent 協作架構：雙小組制",
    m2_overview: "本模組介紹高階 AI Agent 如何依「目的」拆解出兩支獨立小組：負責讓程式碼能跑的技術實作小組，以及負責讓結論站得住腳的決策分析小組，兩者各自形成閉環，卻共用同一個沙盒環境執行與驗證。",
    m2_highlights: ["工程師 Subagent","測試員 Subagent","正方分析師","反方分析師","綜合仲裁者","自癒閉環","辯證推論"],
    m2_p1: "當我們使用 Claude Code 這類具備自我迭代能力的工具處理宏觀任務時，AI 不會只靠單一角色完成所有工作，而是在幕後拆解成不同的 Subagent（子代理人）團隊協同運作。第一支是技術實作小組（Engineering Squad），由工程師與測試員兩個角色組成：工程師負責理解需求與上下文，撰寫對應的自動化腳本或分析程式碼；測試員則負責把程式碼丟進沙盒執行，捕捉報錯訊息，並回饋給工程師修正。兩者形成「寫 Code → 報錯 → 自我修正 → 重新執行」的自癒閉環，一直運作到程式成功為止，過程完全不需要驚動使用者。",
    m2_p2: "但光有技術實作小組還不夠。原始知識庫的工作流第 4 步驟曾提到「正反方觀點在數據模擬中進行辯證分析與推論」，這其實暗示需要另一支完全不同性質的團隊——決策分析小組（Analyst Squad）。這支小組不負責寫程式，而是針對「數據代表的意義」進行辯證：正方分析師從技術可行性與市場機會角度，論證數據的正面意義；反方分析師則從風險、時程延遲、商業衝擊角度提出質疑與反例；最後由綜合仲裁者彙整雙方論點，收斂成一個附帶信心水準的可執行結論。",
    m2_p3: "值得注意的是，兩支小組雖然目的不同，卻共用同一個沙盒環境來執行與驗證：技術實作小組驗證的是「程式碼能不能跑」，決策分析小組驗證的是「結論站不站得住腳」。把這兩種閉環分開定義，能避免我們誤以為「AI 自動生成程式碼」與「AI 自動做出商業判斷」是同一件事——前者是工程問題，後者是判斷力問題，需要不同角色與不同驗收標準。",
    m2_wrapup: "AI Agent 的高階協作並非單一角色包辦一切，而是依目的拆成兩支小組：技術實作小組（工程師＋測試員）形成程式碼自癒閉環；決策分析小組（正方＋反方＋綜合仲裁者）形成辯證推論閉環。兩者共用沙盒作為驗證場域，但驗收標準完全不同，這正是原始知識庫容易被忽略、卻是本次修訂補上的關鍵角色缺口。",

    m3_nav: "3. 五步驟工作流",
    m3_title: "標準工作流 SOP：五步驟",
    m3_overview: "本模組把四層基礎設施與兩支 Agent 小組串成一條完整的情報產出流水線：從環境初始化、工具載入、安全牽線資料，到沙盒驗證與辯證，最後產出 BI 圖表與決策建議。",
    m3_highlights: ["環境初始化","工具與技能載入","安全資料牽線","沙盒驗證與辯證","終端輸出"],
    m3_p1: "第一步是環境初始化，對應容器概念：Claude Code 以目前的專案目錄為邊界，啟動一個獨立運作的邏輯容器環境，確保專案資料與本機系統安全隔離。這一步沒有牽涉任何 Agent 小組，純粹是基礎設施的建立。",
    m3_p2: "第二步是工具與技能載入，對應套件與外掛：AI 會自主檢視任務需求，下載資料分析、網頁爬蟲等套件，並載入處理特定格式（如 PDF 解鎖、多模態視覺）的外掛工具，讓後續步驟具備完整的執行能力。第三步則是安全資料牽線，對應連接器：透過 API 連接器或檔案系統連接器，定時抓取設定主題的最新新聞資料，並與 knowledge_base 資料夾下累積的歷史知識庫進行差異比對，產出每日晨報摘要素材。",
    m3_p3: "第四步是整條工作流的核心，對應沙盒，也是兩支 Agent 小組真正登場的階段：技術實作小組（工程師＋測試員）撰寫並跑通評估用的科學數據模型；決策分析小組（正方＋反方＋綜合仲裁者）則在沙盒的數據模擬結果上，針對新舊數據進行辯證分析與推論。即便程式碼邏輯有誤、或推論一度出現偏差，危險與錯誤都會被鎖死在沙盒內，不會波及核心系統。",
    m3_p4: "第五步是終端輸出，這一步刻意不對應任何一個基礎設施概念，因為它是前四層共同服務的最終目的：沙盒驗證成功後，AI 將數據導出，自動渲染成網頁 BI 趨勢圖表，並綜合決策分析小組的辯證結論，在終端機輸出『建議決策行動』與『應持續追蹤議題』。沒有這一步的產出，前面的隔離、賦能、連結、驗證都失去意義。",
    m3_wrapup: "五步驟工作流依序是：環境初始化（容器）→ 工具與技能載入（套件／外掛）→ 安全資料牽線（連接器）→ 沙盒驗證與辯證（技術與分析雙小組）→ 終端輸出（BI 圖表與決策建議）。前四步是基礎設施逐層搭建的過程，第五步則是整條流水線唯一不對應基礎設施、卻是真正創造價值的產出目標。",

    m4_nav: "4. 指令範本實戰",
    m4_title: "實戰應用：指令範本與案例演練",
    m4_overview: "本模組說明如何用『架構語意』而非『實作細節』向 Claude Code 這類高階 Agent 下達指令，並提供完整版與精簡版兩種指令範本，讓您能立刻套用到自己的主題上。",
    m4_highlights: ["架構語意","Vibe Coding","完整版指令","精簡版指令","主題替換"],
    m4_p1: "使用 Claude Code 這類高階 Agent 時，最常見的誤區是鉅細靡遺地描述「該怎麼寫爬蟲」「該用哪個圖表函式庫」——這其實是把原本該由 AI 自主決定的實作細節，錯誤地丟回給使用者承擔。真正有效率的做法是 Vibe Coding：只描述你要的『架構語意』與『產出目標』，把套件選型、程式碼撰寫、除錯這些細節，交給工程師與測試員這兩個 Subagent 自行處理。",
    m4_p2: "完整版指令範本會明確標註每一句對應到哪一層概念或哪一支 Agent 小組：第一句對應連接器，要求抓取新聞並比對歷史知識庫；第二句對應決策分析小組，要求正反方辯證並收斂結論；第三句對應沙盒與技術實作小組，要求所有驗證腳本在沙盒中安全執行並自我修正；第四句對應終端輸出，要求產出 BI 圖表與決策建議。把指令拆成四句、各自對應一個概念或角色，可以大幅降低 AI 誤解需求的機率。",
    m4_p3: "精簡版指令範本則把四句話濃縮成一句話，適合在已經熟悉這套架構語意之後，快速觸發同樣的工作流。無論是完整版或精簡版，核心技巧都是一樣的：把主題放進方括號 [主題] 的位置替換掉即可，不需要每次重新設計整套流程——因為容器、套件、連接器、沙盒、雙小組、五步驟工作流，本來就是一套可以重複套用的固定架構。",
    m4_wrapup: "向高階 AI Agent 下達指令的關鍵，不在於描述實作細節，而在於用四層基礎設施與雙 Agent 小組的『架構語意』表達你要的產出目標。完整版指令逐句對應概念與角色，精簡版指令則是同一套邏輯的快速觸發版本；兩者共用同一個原則：只替換主題，架構本身可重複套用。",
    m4_terms: [
      { front:"架構語意", back:"用容器、連接器、沙盒、Agent小組等概念描述需求，而非描述實作細節。" },
      { front:"Vibe Coding", back:"只描述目標與架構語意，把套件選型、程式碼撰寫與除錯交給 AI 自主完成的協作方式。" },
      { front:"完整版指令", back:"四句話逐一對應連接器、決策分析小組、沙盒與技術小組、終端輸出四個環節。" },
      { front:"精簡版指令", back:"把完整版四句話濃縮為一句話，適合熟悉架構後快速觸發同樣工作流。" },
      { front:"主題替換", back:"指令範本中唯一需要更動的部分，架構本身可重複套用於不同主題。" }

    m4_q: [
      { q:"使用 Claude Code 時最常見的誤區是什麼？", opts:["描述太多架構語意，讓 AI 無所適從","鉅細靡遺描述實作細節，把該由 AI 決定的部分丟回給使用者","完全不下達任何指令","只使用精簡版指令而不使用完整版"], ans:_A1, exp:"常見誤區是描述過多實作細節（如該用哪個爬蟲套件），這其實是把 AI 該自主決定的部分丟回給使用者承擔，違背 Vibe Coding 的精神。" },
      { q:"完整版指令範本的第三句主要對應哪個概念與角色？", opts:["連接器與資料抓取","沙盒與技術實作小組","容器與環境初始化","外掛與格式處理"], ans:_A1, exp:"第三句要求所有驗證與運算腳本在沙盒環境中安全執行，若出錯由工程師與測試員自我修正，對應沙盒與技術實作小組。" },

    m0_nav: "0. Executive Summary",
    m0_title: "AI Containerization & Advanced Agent Intelligence Workflow",
    m0_intro: "This knowledge base answers one question: when we ask a high-level AI agent like Claude Code to build a system that automatically gathers information, verifies its reasoning, and produces decision recommendations every day, what is actually happening behind the scenes? The answer is not a single clever model writing code — it is a clearly layered infrastructure combined with multiple subagent teams working together with distinct responsibilities. We start with a core metaphor: imagine the whole system as a secured building. The container is an independent house; packages and plugins are the bricks and decorations; the connector is the plumbing and wiring reaching outside; the sandbox is a blast-proof isolation chamber inside the house built specifically to contain risky experiments. We then introduce two specialised agent squads — an engineering squad that makes the code run, and an analyst squad that makes the conclusions hold up. Finally, the four infrastructure layers and two squads are chained into a five-step standard workflow, together with copy-paste-ready prompt templates so that next time you collaborate with AI, you only need to speak in architectural terms instead of implementation details.",
    m0_why: "Why does this architecture matter?",
    m0_why_desc: "Most people using AI tools only see the surface layer — type a prompt, get a result — without realising that four hidden stages (isolation, enablement, connection, verification) determine whether the system stays under control, whether data leaks, and whether the conclusions actually hold up. Understanding this architecture lets you issue precise, safe, high-level instructions instead of relying on luck every time.",

    m1_nav: "1. Four Infrastructure Layers",
    m1_title: "Core Design Principles & Four Infrastructure Layers",
    m1_overview: "This module establishes the foundational metaphor of the whole knowledge base: imagine the AI system as a secured building, layered from inside out into an isolation layer, a capability layer, a communication layer, and a safety layer — corresponding to container, package/plugin, connector, and sandbox.",
    m1_highlights: ["Container","Package","Plugin","Connector","Sandbox"],
    m1_p1: "The container is the foundation of the whole architecture, playing the role of 'an independent house': it packages the application together with the underlying operating system, runtime, and dependencies into a lightweight isolated space. Its meaning lies in consistency — the same container produces the same result no matter which computer or cloud platform it runs on, which is the precondition for an AI model to run reliably.",
    m1_p2: "Once the house is built, we need bricks and decoration — the capability layer played by packages and plugins. A package is a pre-written function library that cannot run on its own, such as pandas for data analysis or playwright for web scraping; a plugin attaches to a host program to extend or enhance a specific function, such as PDF unlocking or multimodal vision processing. Neither can operate independently, yet both are indispensable building materials that give the system its actual capabilities.",
    m1_p3: "Next comes the communication layer's connector, playing the role of 'external plumbing and wiring': it does not execute any logic itself, but safely links the AI to the outside world — a company's SQL database, Google Drive, or an external news API — by carrying data back and forth between systems.",
    m1_p4: "The most critical, and most commonly misunderstood, layer is the sandbox in the safety layer. Many people intuitively picture the sandbox as 'a fence around the outside of the house' meant to keep intruders out — but this metaphor points in the wrong direction. The risk the sandbox actually manages comes from the inside: code the AI itself generates and has not yet been verified. A more accurate metaphor is a dedicated blast-proof isolation chamber inside the house: AI-generated code is confined to this extremely low-privilege room to run, and even if the logic is flawed or behaves maliciously, the danger stays locked inside the chamber instead of spreading to the core system.",
    m1_wrapup: "From the inside out, the four infrastructure layers are the isolation layer (container), the capability layer (package/plugin), the communication layer (connector), and the safety layer (sandbox). The container defines the boundary, packages and plugins provide capability, the connector handles external links, and the sandbox stops internal risk from spreading — each with a clear, indispensable role, together forming the stable and safe foundation an AI system runs on.",
    m1_terms: [
      { front:"Container", back:"An independent house: packages the app with its runtime into a consistent isolated space, so results are identical wherever it runs." },
      { front:"Package", back:"The bricks of the house: pre-written function libraries that cannot run alone, such as pandas or playwright." },
      { front:"Plugin", back:"The house's decoration: attaches to a host program to extend a specific function, such as PDF unlocking or multimodal vision." },
      { front:"Connector", back:"External plumbing and wiring: carries data between systems and platforms without executing any logic itself." },
      { front:"Sandbox", back:"A blast-proof chamber inside the house: contains internal risk (AI-generated code) so failures never reach the core system." },
      { front:"Isolation Layer", back:"Formed by the container; defines the boundary within which the entire system operates." },
      { front:"Capability Layer", back:"Formed by packages and plugins; gives the system its actual usable functions." },
      { front:"Safety Layer", back:"Formed by the sandbox; contains internal risk rather than defending against external intrusion." }
    ],
    m1_q: [
      { q:"Which metaphor most accurately describes the sandbox's function?", opts:["A fence around the outside of the house to keep intruders out","A blast-proof isolation chamber inside the house for risky experiments","Plumbing and wiring connecting the house to the outside","Bricks used to build the house"], ans:_A1, exp:"The sandbox is meant to contain internal risk — AI-generated, unverified code — not to defend against external intrusion, so the correct metaphor is an internal isolation chamber, not an outer fence." },
      { q:"What do packages and plugins have in common?", opts:["Both can run independently without any host program","Both must attach to some environment or host program to operate","Both are bridges that carry data across systems","Both are isolated spaces that limit risky execution"], ans:_A1, exp:"A package is a library and a plugin attaches to a host program — neither runs independently; both are capability-layer building materials." },
      { q:"What is the connector mainly responsible for in this architecture?", opts:["Executing complex business logic","Carrying data between systems or platforms","Confining code to a low-privilege environment","Providing decorative colour and layout"], ans:_A1, exp:"The connector itself executes no logic — it only carries and relays data, such as linking to a database or an external API." },
      { q:"Why is the container called the 'foundation' of the whole architecture?", opts:["Because it beautifies the user interface","Because it packages the app and runtime into a consistent isolated space that everything else depends on","Because it performs dialectical business analysis","Because it is a collection of all packages and needs nothing else"], ans:_A1, exp:"The container provides a consistent, isolated execution environment that packages, plugins, connectors and sandboxes all depend on as their base boundary." },
      { q:"What is the correct inside-out order of the four infrastructure layers?", opts:["Safety→Communication→Capability→Isolation","Isolation→Capability→Communication→Safety","Capability→Isolation→Safety→Communication","Communication→Safety→Isolation→Capability"], ans:_A1, exp:"From inside out: isolation layer (container) → capability layer (package/plugin) → communication layer (connector) → safety layer (sandbox)." }
    ],

    m2_nav: "2. Dual Agent Squads",
    m2_title: "Agent Collaboration Architecture: The Dual-Squad System",
    m2_overview: "This module explains how a high-level AI agent splits into two independent squads by purpose: an engineering squad that makes code run, and an analyst squad that makes conclusions hold up — each forming its own closed loop while sharing the same sandbox for execution and verification.",
    m2_highlights: ["Engineer Subagent","Tester Subagent","Proponent Analyst","Critic Analyst","Synthesizer","Self-Healing Loop","Dialectical Reasoning"],
    m2_p1: "When a self-iterating tool like Claude Code handles a broad task, it does not rely on a single role to do everything — behind the scenes it splits into different subagent teams working together. The first is the Engineering Squad, made up of an Engineer and a Tester: the Engineer understands the requirement and context and writes the corresponding automation script or analysis code; the Tester drops that code into the sandbox to run it, catches error messages, and feeds them back to the Engineer for correction. Together they form a self-healing loop of 'write code → error → self-correct → re-run', continuing until the program succeeds, entirely without disturbing the user.",
    m2_p2: "But the Engineering Squad alone is not enough. Step 4 of the original workflow mentioned 'dialectical analysis between opposing viewpoints on simulated data' — which actually implies an entirely different kind of team: the Analyst Squad. This squad does not write code; instead it debates what the data actually means. A Proponent Analyst argues the positive case from technical feasibility and market opportunity; a Critic Analyst raises risks, schedule delays and business impact as counter-arguments; finally a Synthesizer consolidates both sides into a single actionable conclusion with an attached confidence level.",
    m2_p3: "Notably, although the two squads serve different purposes, they share the same sandbox for execution and verification: the Engineering Squad verifies 'does the code run', while the Analyst Squad verifies 'does the conclusion hold up'. Keeping these two loops separately defined prevents the mistaken assumption that 'AI auto-generating code' and 'AI auto-making business judgments' are the same thing — the former is an engineering problem, the latter a judgment problem, each needing different roles and different acceptance criteria.",
    m2_wrapup: "High-level AI agent collaboration is never a single role doing everything — it splits by purpose into two squads: the Engineering Squad (Engineer + Tester) forms a code self-healing loop; the Analyst Squad (Proponent + Critic + Synthesizer) forms a dialectical reasoning loop. Both share the sandbox as their verification ground, but with completely different acceptance criteria — precisely the role gap the original knowledge base overlooked and this revision fills.",
    m2_terms: [
      { front:"Engineer Subagent", back:"Engineering Squad member who understands the requirement and writes automation scripts or analysis code." },
      { front:"Tester Subagent", back:"Engineering Squad member who runs code in the sandbox, catches errors, and feeds them back for correction." },
      { front:"Self-Healing Loop", back:"Write code → error → correct → re-run, repeating until the program runs successfully — the engineering verification loop." },
      { front:"Proponent Analyst", back:"Analyst Squad member who argues the positive case from technical feasibility and market opportunity." },
      { front:"Critic Analyst", back:"Analyst Squad member who raises risk, schedule and business-impact counter-arguments." },
      { front:"Synthesizer", back:"Analyst Squad member who consolidates both sides into one actionable conclusion with a confidence level." },
      { front:"Dialectical Reasoning Loop", back:"Proponent argues → Critic challenges → Synthesizer consolidates — the analytical loop verifying whether a conclusion holds up." }
    ],
    m2_q: [
      { q:"What exactly is the Engineering Squad's 'self-healing loop'?", opts:["Proponent argues → Critic challenges → Synthesizer consolidates","Write code → error → correct → re-run until it succeeds","Fetch news → compare with history → produce summary","Build container → load packages → connect to external data"], ans:_A1, exp:"The self-healing loop is the Engineer-Tester cycle of writing code, running it in the sandbox, hitting errors, and correcting — repeated until the program runs successfully." },
      { q:"Why did the original knowledge base need an added 'Analyst Squad'?", opts:["Because the Engineer and Tester aren't efficient enough and need more staff","Because the original workflow described pro/con dialectical analysis without defining any corresponding role","Because the sandbox needs more people to maintain it","Because the connector needs shifts of people to ensure data fetching"], ans:_A1, exp:"Step 4 of the original workflow mentioned 'pro/con dialectical analysis' but only the Engineer and Tester had been defined — the Analyst Squad was added to fill that gap." },
      { q:"What is the difference between the Proponent Analyst and the Critic Analyst?", opts:["The Proponent writes code and the Critic tests it","The Proponent argues technical feasibility and market opportunity, the Critic raises risk and business-impact concerns","The Proponent fetches data and the Critic stores it","There is no real difference, only the names differ"], ans:_A1, exp:"The Proponent focuses on the positive case, the Critic focuses on risk and challenge — their opposing views are what makes the dialectic effective." },
      { q:"What do the Engineering Squad and Analyst Squad have in common?", opts:["Both squads write business reports","Both squads share the same sandbox for execution and verification, but with different acceptance criteria","Neither squad needs a sandbox","Their work is identical, just duplicated"], ans:_A1, exp:"Both squads use the sandbox as their verification ground: the Engineering Squad verifies whether code runs, the Analyst Squad verifies whether the conclusion holds up — different acceptance criteria." },
      { q:"What is the Synthesizer's main responsibility?", opts:["Writing automation scripts","Running code in the sandbox and catching errors","Consolidating pro/con arguments into one actionable conclusion with a confidence level","Periodically fetching news and comparing it against the history base"], ans:_A2, exp:"The Synthesizer neither writes code nor debates — it consolidates both sides' views into the final actionable conclusion." }
    ],

    m3_nav: "3. Five-Step Workflow",
    m3_title: "Standard Workflow SOP: Five Steps",
    m3_overview: "This module chains the four infrastructure layers and two agent squads into a complete intelligence pipeline: environment initialisation, tool loading, secure data linking, sandbox verification and dialectic, and finally BI chart and decision output.",
    m3_highlights: ["Environment Init","Tool & Skill Loading","Secure Data Linking","Sandbox Verification & Dialectic","Terminal Output"],
    m3_p1: "Step one is environment initialisation, corresponding to the container: Claude Code launches an independent logical container using the current project directory as its boundary, keeping project data safely isolated from the local system. This step involves no agent squad at all — it is purely infrastructure setup.",
    m3_p2: "Step two is tool and skill loading, corresponding to packages and plugins: the AI autonomously reviews the task requirement and installs packages for data analysis or web scraping, then loads plugins for specific formats (such as PDF unlocking or multimodal vision), giving later steps full operating capability. Step three is secure data linking, corresponding to the connector: through an API or filesystem connector, it periodically fetches the latest news on the configured topic and compares it against the accumulated history in the knowledge_base folder, producing the raw material for a daily briefing.",

const FlipCardDeck = ({ terms, t, moduleId, onCardRead }) => {
  const [groupIdx, setGroupIdx] = useState(0);
  const [flipped, setFlipped] = useState({});
  const [readSet, setReadSet] = useState(new Set());
  const [shownSet, setShownSet] = useState(new Set());
  const [shuffledOrder] = useState(() => [...Array(terms.length).keys()].sort(() => Math.random() - 0.5));

  const groupSize = 2;
  const totalGroups = Math.ceil(terms.length / groupSize);
  const startIdx = groupIdx * groupSize;
  const currentCardIndices = shuffledOrder.slice(startIdx, startIdx + groupSize);

  useEffect(() => {
    const newShown = new Set(shownSet);
    currentCardIndices.forEach(idx => newShown.add(idx));
    if (newShown.size !== shownSet.size) setShownSet(newShown);
  }, [groupIdx]);

  const handleFlip = (origIdx) => {
    setFlipped(f => ({ ...f, [origIdx]: !f[origIdx] }));
    if (!readSet.has(origIdx)) {
      const newRead = new Set(readSet); newRead.add(origIdx); setReadSet(newRead);
      if (onCardRead) onCardRead(moduleId, newRead.size, shownSet.size, terms.length);
    }
  };

  const statusText = t.flip_status.replace('{read}', readSet.size).replace('{shown}', shownSet.size).replace('{total}', terms.length);

  return (
    <div className="mt-8">
      <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-2">{t.key_terms}</h3>
      <p className="text-sm text-slate-400 mb-4">{statusText}</p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {currentCardIndices.map((origIdx) => {
          const term = terms[origIdx];
          return (
            <div key={origIdx} className="perspective cursor-pointer h-36" onClick={() => handleFlip(origIdx)}>
              <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${flipped[origIdx] ? 'rotate-y-180' : ''}`}>
                <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
                  <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5]">{term.front}</p>
                  <p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p>
                </div>
                <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center">
                  <p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{term.back}</p>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="flex items-center gap-3 mt-4">
        <button onClick={() => { setGroupIdx(0); setFlipped({}); }}
          className="px-4 py-2 text-sm border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
          {t.flip_retry}
        </button>
        <button onClick={() => groupIdx < totalGroups-1 && setGroupIdx(groupIdx+1)}
          disabled={groupIdx >= totalGroups-1}
          className="px-4 py-2 text-sm bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">
          {t.flip_next}
        </button>
      </div>
    </div>
  );
};

const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit, moduleName }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState({});
  const [groupIdx, setGroupIdx] = useState(0);
  const groupSize = 2;

  const [quizIndices] = useState(() => [...Array(questions.length).keys()].sort(() => Math.random() - 0.5));
  const totalGroups = Math.ceil(quizIndices.length / groupSize);

  const [shuffledMaps] = useState(() => quizIndices.map(qIdx => {
    const n = questions[qIdx].opts.length;
    return [...Array(n).keys()].sort(() => Math.random() - 0.5);
  }));

  const totalAnswered = Object.keys(selected).length;
  const computeCorrect = () => {
    let c = 0;
    quizIndices.forEach((qIdx, qi) => {
      if (selected[qi] === undefined) return;
      if (shuffledMaps[qi][selected[qi]] === _d(questions[qIdx].ans)) c++;
    });
    return c;
  };
  const statusText = t.quiz_status.replace('{correct}', computeCorrect()).replace('{answered}', totalAnswered).replace('{total}', quizIndices.length);

  const currentStart = groupIdx * groupSize;
  const currentIndices = quizIndices.slice(currentStart, currentStart + groupSize);

  const handleGroupSubmit = () => {
    const allDone = currentIndices.every((_, i) => selected[currentStart + i] !== undefined);
    if (!allDone) return;
    setSubmitted(s => ({ ...s, [groupIdx]: true }));
    if (groupIdx === totalGroups - 1) {
      const wrongQs = [];
      let correct = 0;
      quizIndices.forEach((qIdx, qi) => {
        if (selected[qi] === undefined) return;
        if (shuffledMaps[qi][selected[qi]] === _d(questions[qIdx].ans)) correct++;
        else wrongQs.push(questions[qIdx].q);
      });
      onQuizSubmit(moduleId, correct, quizIndices.length, wrongQs, moduleName);
    }
  };

  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-2">{t.quiz_title}</h3>
      <p className="text-sm text-slate-400 mb-6">{statusText}</p>
      {currentIndices.map((qIdx, localI) => {
        const qi = currentStart + localI;
        const q = questions[qIdx];
        const sMap = shuffledMaps[qi];
        const isGrpSub = !!submitted[groupIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3">{qi+1}. {q.q}</p>
            <div className="space-y-2">
              {sMap.map((origIdx, dIdx) => {
                const isCorrect = origIdx === _d(q.ans);
                const isSel = selected[qi] === dIdx;
                return (
                  <button key={dIdx} onClick={() => !isGrpSub && setSelected(s => ({...s, [qi]: dIdx}))}
                    className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm ${
                      isGrpSub
                        ? isCorrect ? 'bg-green-100 border-green-500 dark:bg-green-900/30'
                          : isSel ? 'bg-red-100 border-red-400 dark:bg-red-900/30' : 'border-slate-200 dark:border-slate-700'
                        : isSel ? 'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400'
                    }`}>
                    {q.opts[origIdx]}
                  </button>
                );
              })}
            </div>
            {isGrpSub && (
              <p className={`mt-2 text-sm italic ${shuffledMaps[qi][selected[qi]] === _d(q.ans) ? 'text-green-600 dark:text-green-400' : 'text-red-500 dark:text-red-400'}`}>
                {shuffledMaps[qi][selected[qi]] === _d(q.ans) ? `✓ ${t.correct}` : `✗ ${t.incorrect}`} — {t.explanation}：{q.exp}
              </p>
            )}
          </div>
        );
      })}
      <div className="flex items-center gap-3">
        {!submitted[groupIdx]
          ? <button onClick={handleGroupSubmit}
              disabled={!currentIndices.every((_,i) => selected[currentStart+i] !== undefined)}
              className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">
              {t.submit}
            </button>
          : <>
              {groupIdx < totalGroups-1 && (
                <button onClick={() => setGroupIdx(groupIdx+1)}
                  className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg">
                  {t.quiz_next}
                </button>
              )}
              <button onClick={() => { setGroupIdx(0); setSelected({}); setSubmitted({}); }}
                className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg">
                {t.quiz_retry}
              </button>
            </>
        }
      </div>
    </div>
  );
};

const StepOrderLab = ({lang, t}) => {
  const [pool] = useState(() => [...STEP_ORDER].sort(() => Math.random()-0.5));

  const [result, setResult] = useState(null);

  const pick = (item) => { if (seq.find(s=>s.id===item.id)) return; setSeq(s => [...s, item]); };
  const check = () => { if (seq.length !== STEP_ORDER.length) return; setResult(seq.every((s,i) => s.order === i+1)); };
  const reset = () => { setSeq([]); setResult(null); };

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-1">{t.mlab_order_title}</h3>
      <p className="text-sm text-slate-500 mb-4">{t.mlab_order_desc}</p>
      <div className="flex flex-wrap gap-2 mb-4">
        {pool.map(item => (
          <button key={item.id} onClick={() => pick(item)} disabled={!!seq.find(s=>s.id===item.id)}
            className="px-3 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 disabled:opacity-30 hover:border-[#004030] dark:hover:border-[#D8C3A5]">
            {lang==='zh' ? item.zh : item.en}

      <div className="min-h-[2.5rem] flex flex-wrap gap-2 mb-4 p-3 bg-slate-50 dark:bg-slate-900/50 rounded-lg">
        {seq.map((item,i) => <span key={item.id} className="px-3 py-1 text-sm bg-[#004030]/10 dark:bg-[#D8C3A5]/10 rounded-full">{i+1}. {lang==='zh'?item.zh:item.en}</span>)}
      </div>
      {result !== null && (
        <p className={`text-sm mb-3 ${result ? 'text-green-600 dark:text-green-400' : 'text-red-500'}`}>

        <button onClick={check} disabled={seq.length!==STEP_ORDER.length} className="px-4 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">{t.mlab_order_check}</button>
        <button onClick={reset} className="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg">{t.mlab_order_reset}</button>

const ConceptMatchLab = ({lang, t}) => {
  const [rightOrder] = useState(() => [...CONCEPT_MATCH].sort(() => Math.random()-0.5));
  const [selLeft, setSelLeft] = useState(null);
  const [matched, setMatched] = useState({});

  const clickRight = (id) => {
    if (!selLeft) return;
    if (selLeft === id) setMatched(m => ({...m, [id]: true}));
    setSelLeft(null);
  };
  const reset = () => { setMatched({}); setSelLeft(null); };
  const allDone = Object.keys(matched).length === CONCEPT_MATCH.length;

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-1">{t.mlab_match_title}</h3>
      <p className="text-sm text-slate-500 mb-4">{t.mlab_match_desc}</p>
      <div className="grid grid-cols-2 gap-4">
        <div className="space-y-2">
          {CONCEPT_MATCH.map(c => (
            <button key={c.id} onClick={() => !matched[c.id] && setSelLeft(c.id)}
              className={`w-full text-left px-3 py-2 text-sm rounded-lg border ${matched[c.id] ? 'bg-green-100 dark:bg-green-900/30 border-green-400 opacity-60' : selLeft===c.id ? 'border-[#004030] dark:border-[#D8C3A5]' : 'border-slate-300 dark:border-slate-600'}`}>
              {lang==='zh'?c.zh:c.en}
            </button>
          ))}
        </div>
        <div className="space-y-2">
          {rightOrder.map(c => (
            <button key={c.id} onClick={() => clickRight(c.id)} disabled={!!matched[c.id]}
              className={`w-full text-left px-3 py-2 text-sm rounded-lg border ${matched[c.id] ? 'bg-green-100 dark:bg-green-900/30 border-green-400 opacity-60' : 'border-slate-300 dark:border-slate-600'}`}>
              {lang==='zh'?c.metaZh:c.metaEn}
            </button>
          ))}

      </div>
      {allDone && <p className="text-sm text-green-600 dark:text-green-400 mt-4">{t.mlab_match_done}</p>}
      <button onClick={reset} className="mt-4 px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg text-sm">{t.mlab_match_reset}</button>
    </div>
  );
};

const PromptGeneratorLab = ({lang, t}) => {
  const [topic, setTopic] = useState('');
  const [generated, setGenerated] = useState('');
  const [copied, setCopied] = useState(false);

  const generate = () => {
    const topicText = topic.trim() || (lang==='zh' ? '固態電池技術商用化' : 'Solid-state battery commercialisation');
    const template = lang==='zh'
      ? `針對 ${topicText}，在容器內建立每日晨報系統：連接器抓新聞比對歷史庫 → 分析小組正反辯證 → 沙盒驗證程式碼 → 輸出 BI 圖表與決策建議。`
      : `For ${topicText}, build a daily briefing system inside the container: connector fetches news and diffs against history → Analyst Squad debates pro/con → sandbox verifies code → output BI chart and decision recommendations.`;
    setGenerated(template);
    setCopied(false);
  };

  const copy = () => {
    if (!generated) return;
    try { navigator.clipboard.writeText(generated); setCopied(true); setTimeout(()=>setCopied(false), 2000); } catch(e) {}
  };

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-1">{t.mlab_prompt_title}</h3>
      <input value={topic} onChange={e=>setTopic(e.target.value.slice(0,80))} placeholder={t.mlab_prompt_ph}
        className="w-full px-3 py-2 mt-3 mb-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent text-sm" />
      <button onClick={generate} className="px-4 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg text-sm">{t.mlab_prompt_generate}</button>
      {generated && (
        <div className="mt-4 p-4 bg-slate-50 dark:bg-slate-900/50 rounded-lg text-sm leading-relaxed">
          <p>{generated}</p>
          <button onClick={copy} className="mt-3 px-3 py-1.5 text-xs border border-slate-300 dark:border-slate-600 rounded-lg">
            {copied ? t.mlab_prompt_copied : t.mlab_prompt_copy}
          </button>
        </div>
      )}
    </div>
  );
};

/* ---------- App ---------- */
function App() {
  const LS_KEY = 'CAIW_SPA_analytics';
  const LS_STU = 'CAIW_SPA_student';
  const loadLS = (key, fb) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } };

  const [lang, setLang] = useState('en');
  const [isDark, setIsDark] = useState(true);
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [ttsState, setTtsState] = useState('idle');
  const [studentInfo, setStudentInfo] = useState(() => loadLS(LS_STU, { group:'', dept:'', id:'', nameEn:'', nameZh:'' }));
  const [analytics, setAnalytics] = useState(() => loadLS(LS_KEY, {
    time: Array(TOTAL).fill(0), clicks: Array(TOTAL).fill(0),
    quizCorrect: Array(TOTAL).fill(0), quizTotal: Array(TOTAL).fill(0),
    cardsRead: Array(TOTAL).fill(0), cardsTotal: Array(TOTAL).fill(0),
    wrongTopics: {}
  }));
  const contentRef = useRef(null);
  const menuRef = useRef(null);
  const t = dict[lang];

  useEffect(() => { document.documentElement.classList.toggle('dark', isDark); }, [isDark]);
  useEffect(() => { try { localStorage.setItem(LS_KEY, JSON.stringify(analytics)); } catch {} }, [analytics]);
  useEffect(() => { try { localStorage.setItem(LS_STU, JSON.stringify(studentInfo)); } catch {} }, [studentInfo]);

  useEffect(() => {
    const timer = setInterval(() => {
      setAnalytics(a => { const time = [...a.time]; time[module] = (time[module]||0) + 1; return {...a, time}; });
    }, 1000);
    return () => clearInterval(timer);
  }, [module]);

  useEffect(() => {
    const handleClick = () => setAnalytics(a => { const clicks = [...a.clicks]; clicks[module] = (clicks[module]||0) + 1; return {...a, clicks}; });
    const node = contentRef.current;
    if (node) node.addEventListener('click', handleClick);
    return () => { if (node) node.removeEventListener('click', handleClick); };
  }, [module]);

  useEffect(() => {
    const handleOutside = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', handleOutside);
    return () => document.removeEventListener('mousedown', handleOutside);
  }, []);

  const handleQuizSubmit = (mid, correct, total, wrongQs) => {
    setAnalytics(a => {
      const qc = [...a.quizCorrect], qt = [...a.quizTotal];
      qc[mid] = correct; qt[mid] = total;
      const wt = { ...a.wrongTopics }; wt[mid] = wrongQs || [];
      return { ...a, quizCorrect: qc, quizTotal: qt, wrongTopics: wt };
    });
  };
  const handleCardRead = (mid, readCount, shownCount, totalCount) => {
    setAnalytics(a => {
      const cr = [...a.cardsRead], ct = [...a.cardsTotal];
      cr[mid] = readCount; ct[mid] = totalCount;
      return { ...a, cardsRead: cr, cardsTotal: ct };
    });
  };

  const modulesList = [
    { id:0, icon:'📋', title:t.m0_nav },
    { id:1, icon:'🧱', title:t.m1_nav },
    { id:2, icon:'🤖', title:t.m2_nav },
    { id:3, icon:'🔄', title:t.m3_nav },
    { id:4, icon:'⚡', title:t.m4_nav },
    { id:IDX_LAB, icon:'🧪', title:t.mlab_nav },
    { id:IDX_RES, icon:'🌐', title:t.mres_nav },
    { id:IDX_ANA, icon:'📊', title:t.analytics_nav }
  ];

  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { speechSynthesis.cancel(); setTtsState('idle'); return; }
    if (action === 'pause') { speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { speechSynthesis.resume(); setTtsState('playing'); return; }
      speechSynthesis.cancel();
      const sep = lang === 'zh' ? '。 ' : '. ';
      let texts = [];
      if (module === 0) {
        texts = [t.m0_title, t.m0_intro, t.m0_why, t.m0_why_desc,
          ...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`),
          ...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)];
      } else if (module >= 1 && module <= NUM_LEARN) {
        const mk = `m${module}`;
        texts = [t[`${mk}_title`], t[`${mk}_overview`], ...(t[`${mk}_highlights`]||[]),
          t[`${mk}_p1`], t[`${mk}_p2`], t[`${mk}_p3`], t[`${mk}_p4`],
          t[`${mk}_wrapup`],
          ...(t[`${mk}_terms`]||[]).flatMap(tm=>[tm.front, tm.back])];
      } else if (module === IDX_LAB) {
        texts = [t.mlab_title, t.mlab_desc, ...(t.mlab_labs||[]).map(l=>`${l.title}. ${l.desc||''}`)];
      } else if (module === IDX_RES) {
        texts = [t.mres_title, t.mres_desc];
      } else if (module === IDX_ANA) {
        const tc = analytics.quizCorrect.reduce((a,b)=>a+b,0);
        const ta = analytics.quizTotal.reduce((a,b)=>a+b,0);
        const oa = ta>0 ? Math.round(tc/ta*100) : 0;
        const wk = [];
        for (let i=1;i<=NUM_LEARN;i++) {
          if (analytics.quizTotal[i]>0) {
            const acc = Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100);
            if (acc<75) wk.push({name:t[`m${i}_title`],acc});
          }
        }
        wk.sort((a,b)=>a.acc-b.acc);
        texts = [t.analytics_title, t.analytics_desc,
          `${t.analytics_total_time}: ${analytics.time.reduce((a,b)=>a+b,0)}${t.analytics_sec}`,
          `${t.analytics_total_clicks}: ${analytics.clicks.reduce((a,b)=>a+b,0)}${t.analytics_times}`,
          `${t.analytics_overall_acc}: ${oa}%`];
        if (wk.length) { texts.push(t.analytics_wp_tts_intro); wk.forEach(w=>texts.push(t.analytics_wp_tts_module.replace('{name}',w.name).replace('{acc}',w.acc))); }
        else if (ta>0) texts.push(t.analytics_wp_tts_allpass);
      }
      texts = texts.filter(Boolean);
      const utt = new SpeechSynthesisUtterance(texts.join(sep));
      utt.rate = 0.95;
      const voices = speechSynthesis.getVoices();
      if (lang==='zh') {
        const v = voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh'));
        if (v) utt.voice = v; utt.lang = 'zh-TW';
      } else {
        const v = voices.find(v=>v.lang==='en-GB'&&(v.name.includes('Male')||v.name.includes('Daniel')))||voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en'));
        if (v) utt.voice = v; utt.lang = 'en-GB';
      }
      utt.onend = () => setTtsState('idle');
      utt.onerror = () => setTtsState('idle');
      speechSynthesis.speak(utt);
      setTtsState('playing');
    }
  };

  const goTo = (m) => { setModule(m); window.scrollTo({top:0,behavior:'smooth'}); };

  const exportCSV = () => {
    const rows = [['Module','Time(s)','Clicks','Correct','Total','Accuracy%','Cards Read','Cards Total','Wrong Questions']];
    const titleFor = (i) => i===0?t.m0_title : i<=NUM_LEARN?t[`m${i}_title`] : i===IDX_LAB?t.mlab_title : i===IDX_RES?t.mres_title : t.analytics_title;
    for (let i=0;i<TOTAL;i++) {
      const acc = analytics.quizTotal[i]>0 ? Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100) : '';
      const wrong = (analytics.wrongTopics[i]||[]).join(' | ').replace(/"/g,"'");
      rows.push([titleFor(i), analytics.time[i]||0, analytics.clicks[i]||0, analytics.quizCorrect[i]||0, analytics.quizTotal[i]||0, acc, analytics.cardsRead[i]||0, analytics.cardsTotal[i]||0, `"${wrong}"`]);
    }
    const meta = [['Group',studentInfo.group],['Dept',studentInfo.dept],['ID',studentInfo.id],['Name(EN)',studentInfo.nameEn],['Name(ZH)',studentInfo.nameZh],[]];
    const csv = [...meta, ...rows].map(r=>r.join(',')).join('\n');
    const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${dict.zh.brand}${dict.zh.title}_${studentInfo.nameEn}_${studentInfo.nameZh}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const clearHistory = () => {
    if (!window.confirm(t.analytics_wp_clear_confirm)) return;
    setAnalytics({ time:Array(TOTAL).fill(0), clicks:Array(TOTAL).fill(0), quizCorrect:Array(TOTAL).fill(0), quizTotal:Array(TOTAL).fill(0), cardsRead:Array(TOTAL).fill(0), cardsTotal:Array(TOTAL).fill(0), wrongTopics:{} });
    try { localStorage.removeItem(LS_KEY); } catch(e) {}
  };

  const canExport = studentInfo.group && studentInfo.dept && studentInfo.id && studentInfo.nameEn && studentInfo.nameZh;

  return (
    <div className="min-h-screen bg-[#f4f4f4] dark:bg-[#121212] text-slate-800 dark:text-slate-200 selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030] flex flex-col overflow-x-hidden">
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">
        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-1 sm:gap-2 min-w-0">
            <div className="relative" ref={menuRef}>
              <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 hover:bg-white/10 rounded-lg"><IconMenu/></button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] text-slate-800 dark:text-slate-200">
                  {modulesList.map(m => (
                    <button key={m.id} onClick={() => { setMenuOpen(false); goTo(m.id); }}
                      className={`w-full flex items-center gap-3 px-4 py-3 text-sm hover:bg-slate-100 dark:hover:bg-slate-700 text-left ${module===m.id ? 'font-bold text-[#004030] dark:text-[#D8C3A5]' : ''}`}>
                      <span>{m.icon}</span><span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            <button onClick={() => goTo(0)} className="p-2 hover:bg-white/10 rounded-lg" title={t.nav_home}><IconHome size={18}/></button>
            <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 min-w-0">
              <span className="font-serif font-black text-[#D8C3A5] text-lg tracking-widest">{t.brand}</span>
              <span className="hidden sm:inline font-serif font-bold text-sm md:text-base truncate max-w-[40vw]">{t.title}</span>
            </button>
          </div>
          <div className="flex items-center gap-1 sm:gap-2 shrink-0">
            <button onClick={() => handleTTS(ttsState==='playing' ? 'pause' : 'play')} className="p-2 hover:bg-white/10 rounded-lg" title={t.audio_read}>
              {ttsState==='playing' ? <IconPause size={18}/> : <IconPlay size={18}/>}
            </button>
            <button onClick={() => handleTTS('stop')} className="p-2 hover:bg-white/10 rounded-lg"><IconSquare size={18}/></button>
            <button onClick={() => setLang(lang==='zh'?'en':'zh')} className="p-2 hover:bg-white/10 rounded-lg text-sm font-bold flex items-center gap-1">
              <IconGlobe size={16}/>{lang==='zh'?'EN':'中'}
            </button>
            <button onClick={() => setIsDark(!isDark)} className="p-2 hover:bg-white/10 rounded-lg">{isDark ? <IconSun size={18}/> : <IconMoon size={18}/>}</button>
          </div>
        </div>
      </header>

      <div className="flex-1 flex flex-col md:flex-row max-w-7xl mx-auto w-full pt-16">
        <aside className="hidden md:block w-64 shrink-0 border-r border-slate-200 dark:border-slate-700 p-4">
          {modulesList.map(m => (
            <button key={m.id} onClick={() => goTo(m.id)}
              className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm mb-1 text-left ${module===m.id ? 'bg-[#004030]/10 dark:bg-[#D8C3A5]/10 text-[#004030] dark:text-[#D8C3A5] font-bold' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
              <span>{m.icon}</span><span className="truncate">{m.title}</span>
            </button>
          ))}
        </aside>

        <main ref={contentRef} className="flex-1 min-w-0 p-4 md:p-8">

          {module === 0 && (
            <div className="animate-fade-in">
              <div className="rounded-2xl bg-gradient-to-br from-[#004030] to-[#00291f] dark:from-slate-800 dark:to-slate-900 text-white p-8 md:p-12 mb-8">
                <p className="text-[#D8C3A5] text-sm font-bold uppercase tracking-widest mb-3">{t.brand} · {t.subtitle}</p>
                <h1 className="font-serif font-black text-3xl md:text-5xl mb-4">{t.m0_title}</h1>
                <p className="text-white/80 max-w-2xl leading-relaxed mb-6">{t.m0_intro}</p>
                <button onClick={() => goTo(1)} className="px-6 py-3 bg-[#D8C3A5] text-[#004030] font-bold rounded-lg hover:bg-white transition-colors">
                  {t.m0_start}
                </button>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                {t.m0_stats.map((s,i) => (
                  <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center border border-slate-200 dark:border-slate-700">
                    <p className="text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{s.val}</p>
                    <p className="text-xs text-slate-500 mt-1">{s.label}</p>
                  </div>
                ))}
              </div>
              <div className="bg-slate-100 dark:bg-slate-800 rounded-xl p-6 mb-10">
                <h2 className="font-serif font-bold text-xl mb-2">{t.m0_why}</h2>
                <p className="text-slate-600 dark:text-slate-300 leading-relaxed">{t.m0_why_desc}</p>
              </div>
              <div className="space-y-3">
                {t.m0_modules.map((m,i) => (
                  <button key={i} onClick={() => goTo(i+1)}
                    className="w-full flex items-center gap-4 p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] transition-all text-left">
                    <span className="font-serif font-black text-2xl text-[#D8C3A5]">{m.num}</span>
                    <div className="flex-1">
                      <p className="font-bold">{m.title}</p>
                      <p className="text-sm text-slate-500">{m.desc}</p>
                    </div>
                    <IconChevronRight/>
                  </button>
                ))}
              </div>
            </div>
          )}

          {module >= 1 && module <= NUM_LEARN && (
            <div className="space-y-6 text-lg leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
              <H2 icon={modulesList[module].icon} number={module}>{t[`m${module}_title`]}</H2>
              <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-5 border-l-4 border-[#D8C3A5]">
                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-2">{t.overview_label}</h3>
                <p>{t[`m${module}_overview`]}</p>
              </div>
              <div>
                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3">{t.highlights_label}</h3>
                <div className="flex flex-wrap gap-2">
                  {t[`m${module}_highlights`].map((h,i) => (
                    <span key={i} className="px-3 py-1 bg-[#004030]/10 dark:bg-[#D8C3A5]/10 text-[#004030] dark:text-[#D8C3A5] rounded-full text-sm font-medium">{h}</span>
                  ))}
                </div>
              </div>
              <div>
                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3">{t.deep_dive_label}</h3>
                <p>{t[`m${module}_p1`]}</p>
                <p className="p-4 bg-slate-100 dark:bg-slate-800 rounded-lg italic font-serif">{t[`m${module}_p2`]}</p>
                <p>{t[`m${module}_p3`]}</p>
                {t[`m${module}_p4`] && <p>{t[`m${module}_p4`]}</p>}
              </div>
              <div className="flex justify-center text-[#004030] dark:text-[#D8C3A5] py-4">
                {module===1 && <LayeredDiagram lang={lang}/>}
                {module===2 && <SquadDiagram lang={lang}/>}
                {module===3 && <PipelineDiagram lang={lang}/>}
                {module===4 && <TemplateDiagram lang={lang}/>}
              </div>
              <FlipCardDeck key={`cards-${module}`} terms={t[`m${module}_terms`]} t={t} moduleId={module} onCardRead={handleCardRead} />
              <div className="bg-slate-100 dark:bg-slate-800 rounded-xl p-5">
                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-2">{t.wrapup_label}</h3>
                <p className="italic">{t[`m${module}_wrapup`]}</p>
              </div>
              <ModuleQuiz key={`quiz-${module}`} questions={t[`m${module}_q`]} t={t} moduleId={module} onQuizSubmit={handleQuizSubmit} moduleName={t[`m${module}_title`]} />
            </div>
          )}

          {module === IDX_LAB && (
            <div className="space-y-6 animate-fade-in">
              <H2 icon="🧪" number={IDX_LAB}>{t.mlab_title}</H2>
              <p className="text-lg text-slate-600 dark:text-slate-300">{t.mlab_desc}</p>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                {t.mlab_labs.map((l,i) => (
                  <div key={i} className="bg-slate-50 dark:bg-slate-900/50 rounded-xl p-4 border border-slate-200 dark:border-slate-700">
                    <p className="font-bold text-[#004030] dark:text-[#D8C3A5]">{l.title}</p>
                    <p className="text-sm text-slate-500 mt-1">{l.desc}</p>
                  </div>
                ))}
              </div>
              <StepOrderLab lang={lang} t={t} />
              <ConceptMatchLab lang={lang} t={t} />
              <PromptGeneratorLab lang={lang} t={t} />
              <SandboxRiskLab t={t} />
            </div>
          )}

          {module === IDX_RES && (
            <div className="space-y-8 animate-fade-in">
              <H2 icon="🌐" number={IDX_RES}>{t.mres_title}</H2>
              <p className="text-lg text-slate-600 dark:text-slate-300">{t.mres_desc}</p>
              {RESOURCES.map((g,i) => (
                <div key={i}>
                  <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3">{t[g.group]}</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {g.items.map((it,j) => <LinkCard key={j} label={it.label} url={it.url} desc={it.desc[lang]} />)}
                  </div>
                </div>
              ))}
            </div>
          )}

          {module === IDX_ANA && (() => {
            const totalTime = analytics.time.reduce((a,b)=>a+b,0);
            const totalClicks = analytics.clicks.reduce((a,b)=>a+b,0);
            const totalCorrect = analytics.quizCorrect.reduce((a,b)=>a+b,0);
            const totalQuiz = analytics.quizTotal.reduce((a,b)=>a+b,0);
            const overallAcc = totalQuiz>0 ? Math.round(totalCorrect/totalQuiz*100) : 0;
            const totalCardsRead = analytics.cardsRead.reduce((a,b)=>a+b,0);
            const totalCardsTotal = analytics.cardsTotal.reduce((a,b)=>a+b,0);
            const cardUsage = totalCardsTotal>0 ? Math.round(totalCardsRead/totalCardsTotal*100) : 0;
            const weakPoints = [];
            for (let i=1;i<=NUM_LEARN;i++) {
              if (analytics.quizTotal[i]>0) {
                const acc = Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100);
                if (acc<75) weakPoints.push({ id:i, name:t[`m${i}_title`], acc });
              }
            }
            weakPoints.sort((a,b)=>a.acc-b.acc);

            return (
              <div className="space-y-8 animate-fade-in">
                <H2 icon="📊" number={IDX_ANA}>{t.analytics_title}</H2>
                <p className="text-lg text-slate-600 dark:text-slate-300">{t.analytics_desc}</p>

                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center border border-slate-200 dark:border-slate-700">
                    <p className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{totalTime}{t.analytics_sec}</p>
                    <p className="text-xs text-slate-500 mt-1">{t.analytics_total_time}</p>
                  </div>
                  <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center border border-slate-200 dark:border-slate-700">
                    <p className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{totalClicks}{t.analytics_times}</p>
                    <p className="text-xs text-slate-500 mt-1">{t.analytics_total_clicks}</p>
                  </div>
                  <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center border border-slate-200 dark:border-slate-700">
                    <p className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{overallAcc}%</p>
                    <p className="text-xs text-slate-500 mt-1">{t.analytics_overall_acc}</p>
                  </div>
                  <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center border border-slate-200 dark:border-slate-700">
                    <p className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{cardUsage}%</p>
                    <p className="text-xs text-slate-500 mt-1">{t.analytics_card_usage}</p>
                  </div>
                </div>

                <div>
                  <h3 className="font-serif font-bold text-lg mb-3">{t.analytics_progress_title}</h3>
                  <div className="space-y-2">
                    {Array.from({length:NUM_LEARN}).map((_,idx) => {
                      const i = idx+1;
                      const visited = (analytics.cardsTotal[i]||0) > 0 || (analytics.quizTotal[i]||0) > 0 || (analytics.time[i]||0) > 0;
                      const quizDone = (analytics.quizTotal[i]||0) > 0;
                      const pct = visited ? (quizDone ? 100 : 50) : 0;
                      return (
                        <button key={i} onClick={() => goTo(i)}
                          className="w-full text-left flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-900/50 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
                          <span className="text-sm w-40 truncate">{t[`m${i}_title`]}</span>
                          <div className="flex-1 h-2 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                            <div className="h-full bg-[#004030] dark:bg-[#D8C3A5]" style={{width: pct+'%'}}/>
                          </div>
                          <span className="text-xs text-slate-400 w-24 text-right shrink-0">
                            {quizDone ? t.analytics_progress_quiz_done : visited ? t.analytics_progress_visited : t.analytics_progress_not_visited}
                          </span>
                        </button>
                      );
                    })}
                  </div>
                </div>

                <div className="bg-slate-50 dark:bg-slate-900/50 rounded-xl p-6">
                  <h3 className="font-serif font-bold text-lg mb-3">{t.analytics_wp_title}</h3>
                  {weakPoints.length > 0 ? (
                    <div className="space-y-3">
                      {weakPoints.map(w => (
                        <div key={w.id} className="p-3 bg-white dark:bg-slate-800 rounded-lg">
                          <p className="text-sm font-bold">{w.name} — {w.acc}%</p>
                          {(analytics.wrongTopics[w.id]||[]).length > 0 && (
                            <p className="text-xs text-slate-500 mt-1">{t.analytics_wp_incorrect} {(analytics.wrongTopics[w.id]||[]).join('; ')}</p>
                          )}
                          <button onClick={() => goTo(w.id)} className="text-xs text-[#004030] dark:text-[#D8C3A5] underline mt-1">{t.analytics_wp_goto}</button>
                        </div>
                      ))}
                    </div>
                  ) : totalQuiz > 0 ? (
                    <p className="text-sm text-green-600 dark:text-green-400">{t.analytics_wp_allpass}</p>
                  ) : (
                    <p className="text-sm text-slate-400">{t.analytics_no_data}</p>
                  )}
                  <p className="text-xs text-slate-400 mt-4">💾 {t.analytics_wp_saved}</p>
                  <button onClick={clearHistory} className="mt-3 px-4 py-2 bg-red-500 text-white text-sm font-bold rounded-lg">{t.analytics_wp_clear}</button>
                </div>

                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="border-b border-slate-300 dark:border-slate-600 text-left">
                        <th className="py-2 pr-4">{t.analytics_module}</th>
                        <th className="py-2 pr-4">{t.analytics_time}</th>
                        <th className="py-2 pr-4">{t.analytics_clicks}</th>
                        <th className="py-2 pr-4">{t.analytics_correct_ans_total}</th>
                        <th className="py-2 pr-4">{t.analytics_cards_read_total}</th>
                      </tr>
                    </thead>
                    <tbody>
                      {Array.from({length:NUM_LEARN}).map((_,idx) => {
                        const i = idx+1;
                        return (
                          <tr key={i} className="border-b border-slate-100 dark:border-slate-800">
                            <td className="py-2 pr-4">{t[`m${i}_title`]}</td>
                            <td className="py-2 pr-4">{analytics.time[i]||0}{t.analytics_sec}</td>
                            <td className="py-2 pr-4">{analytics.clicks[i]||0}</td>
                            <td className="py-2 pr-4">{analytics.quizTotal[i] ? `${analytics.quizCorrect[i]}/${analytics.quizTotal[i]}` : t.analytics_no_data}</td>
                            <td className="py-2 pr-4">{analytics.cardsTotal[i] ? `${analytics.cardsRead[i]}/${analytics.cardsTotal[i]}` : t.analytics_no_data}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                <div className="bg-slate-50 dark:bg-slate-900/50 rounded-xl p-6">
                  <h3 className="font-serif font-bold text-lg mb-4">{t.analytics_form_title}</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="text-xs text-slate-500 block mb-1">{t.analytics_group}</label>
                      <select value={studentInfo.group} onChange={e=>setStudentInfo(s=>({...s, group:e.target.value}))}
                        className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent text-sm">
                        <option value="">{t.analytics_group_select}</option>
                        {t.group_options.map(g => <option key={g} value={g}>{g}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="text-xs text-slate-500 block mb-1">{t.analytics_dept}</label>
                      <input value={studentInfo.dept} onChange={e=>setStudentInfo(s=>({...s, dept:e.target.value.slice(0,20)}))} placeholder={t.analytics_dept_ph}
                        className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent text-sm" />
                    </div>
                    <div>
                      <label className="text-xs text-slate-500 block mb-1">{t.analytics_id}</label>
                      <input value={studentInfo.id} onChange={e=>setStudentInfo(s=>({...s, id:e.target.value.replace(/[^0-9]/g,'').slice(0,12)}))} placeholder={t.analytics_id_ph}
                        className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent text-sm" />
                    </div>
                    <div>
                      <label className="text-xs text-slate-500 block mb-1">{t.analytics_name_en}</label>
                      <input value={studentInfo.nameEn} onChange={e=>setStudentInfo(s=>({...s, nameEn:e.target.value.replace(/[<>"'&\\]/g,'').slice(0,50)}))} placeholder={t.analytics_name_en_ph}
                        className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent text-sm" />
                    </div>
                    <div>
                      <label className="text-xs text-slate-500 block mb-1">{t.analytics_name_zh}</label>
                      <input value={studentInfo.nameZh} onChange={e=>setStudentInfo(s=>({...s, nameZh:e.target.value.replace(/[<>"'&\\]/g,'').slice(0,50)}))} placeholder={t.analytics_name_zh_ph}
                        className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent text-sm" />
                    </div>
                  </div>
                  {!canExport && <p className="text-xs text-amber-500 mt-3">{t.analytics_fill_required}</p>}
                  <button onClick={exportCSV} disabled={!canExport}
                    className="mt-4 px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">
                    {t.analytics_export_csv}
                  </button>
                </div>
              </div>
            );
          })()}

          <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700">
            <button onClick={() => goTo(Math.max(0,module-1))} disabled={module===0}
              className="px-4 py-2 text-sm border border-slate-300 dark:border-slate-600 rounded-lg disabled:opacity-0">{t.nav_prev}</button>
            <button onClick={() => goTo(Math.min(TOTAL-1,module+1))} disabled={module===TOTAL-1}
              className="px-4 py-2 text-sm bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-0">{t.nav_next}</button>
          </div>
        </main>
      </div>

      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-3">
          <span>{t.architect_label}&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline">{t.architect_name}</a></span>
          <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})} className="text-[#D8C3A5] hover:text-white font-bold">Top ↑</button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
